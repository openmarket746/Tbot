services:
  - type: web
    name: tbot
    runtime: python
    region: oregon
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class gthread --threads 4 -w 1 --bind 0.0.0.0:$PORT --timeout 120 front:app

    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      # Set these in Render dashboard (never commit secrets to GitHub):
      # SECRET_KEY, ADMIN_PASSWORD, ADMIN_PATH, GMAIL_ADDRESS, GMAIL_APP_PASS,
      # ADMIN_EMAIL, APP_URL, USDT_ADDRESS, PRICE_USD, LICENSE_DAYS, FROM_NAME
