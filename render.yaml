services:
  - type: web
    name: tbot
    runtime: python
    region: oregon
    plan: free

    # Pin Python 3.11 — gevent and other packages are not compatible with 3.14
    pythonVersion: "3.11.9"

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class gevent -w 1 --bind 0.0.0.0:$PORT --timeout 120 front:app

    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      # Set these in the Render dashboard — never commit secrets to GitHub:
      # SECRET_KEY, ADMIN_PASSWORD, ADMIN_PATH, GMAIL_ADDRESS, GMAIL_APP_PASS,
      # ADMIN_EMAIL, APP_URL, USDT_ADDRESS, PRICE_USD, LICENSE_DAYS, FROM_NAME
